# docker-compose-DIRECT.yml
# HCC Plan VNC Integration - Option A Minimal Window Manager (PARALLELER TEST)
# Basierend auf bewährter docker-compose-PHASE-2B.yml aber mit Dockerfile-minimal

networks:
  guac-network-direct:
    driver: bridge

volumes:
  guacamole_recordings_direct:
    driver: local
  hcc_anna_home_direct:
    driver: local

services:
  # Bewährte Guacamole-Infrastruktur (identisch zu Phase 2B, aber separater Namespace)
  # ==============================================================================
  
  # Guacamole Daemon
  guacd:
    image: guacamole/guacd:latest
    container_name: hcc-guacd-direct-v2
    networks:
      - guac-network-direct
    restart: unless-stopped
    volumes:
      - guacamole_recordings_direct:/recordings

  # Guacamole Web Interface 
  guacamole-direct:
    image: guacamole/guacamole:latest
    container_name: hcc-guacamole-direct-v2
    environment:
      - GUACD_HOSTNAME=guacd
      - GUACD_PORT=4822
      - GUACAMOLE_HOME=/etc/guacamole
    networks:
      - guac-network-direct
    ports:
      - "8081:8080"  # Anderer Port für parallele Tests (8081 statt 8080)
    depends_on:
      - guacd
    restart: unless-stopped
    volumes:
      - ./guacamole.properties:/etc/guacamole/guacamole.properties:ro
      - ./user-mapping-DIRECT.xml:/etc/guacamole/user-mapping.xml:ro
      - guacamole_recordings_direct:/recordings

  # HCC Plan VNC Integration - Option A Direct GUI
  # ==============================================
  
  # HCC Plan VNC-Container für Anna (MINIMAL WINDOW MANAGER)
  hcc-anna-direct:
    build:
      context: .
      dockerfile: Dockerfile-minimal  # ← MINIMAL VERSION
    container_name: hcc-vnc-anna-direct-v2
    environment:
      # VNC-Konfiguration (identisch zu Phase 2B)
      - DISPLAY=:1
      - RESOLUTION=1920x1080x24
      - VNC_PORT=5900
      - VNC_PASSWORD=vncpass123
      
      # HCC Plan User-Konfiguration (identisch)
      - HCC_USER_ID=anna
      - HCC_PROJECT_ID=demo-project
      - HCC_USER_ROLE=planner
      
      # Python/Qt Environment (identisch)
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - QT_QPA_PLATFORM=xcb
      - QT_X11_NO_MITSHM=1
      - HOME=/root
      
      # Database-Konfiguration (identisch)
      - DATABASE_URL=sqlite:////root/.local/share/happy_code_company/hcc_plan/database/database.sqlite
      
    networks:
      - guac-network-direct
    ports:
      - "5902:5900"  # Anderer Port für parallele Tests (5902 statt 5901)
      - "6902:6901"  # noVNC Web-Interface (paralleler Port)
    restart: unless-stopped
    volumes:
      # Database-Integration (identisch zu Phase 2B)
      - ./database/db_docker_test.sqlite:/root/.local/share/happy_code_company/hcc_plan/database/database.sqlite:rw
      - ./database:/app/database:ro
      - ./configuration:/app/configuration:ro
      
      # User-spezifische Session-Persistierung (separate Volumes)
      - hcc_anna_home_direct:/recordings
      - guacamole_recordings_direct:/recordings
      
      # X11 Socket-Sharing (identisch)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*main.py' && pgrep -f 'Xvfb' && pgrep -f 'x11vnc' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

# Option A Integration-Übersicht:
# ===============================
#
# BROWSER-FLOW (PARALLEL TESTING):
# Browser → http://localhost:8081/guacamole/ → anna/test123 → HCC Plan GUI (DIRECT)
#
# CONTAINER-ARCHITEKTUR:
# - guacd-direct:      Guacamole Connection Daemon (separater Namespace)
# - guacamole-direct:  Web-Interface mit XML-Auth (Port 8081)
# - hcc-anna-direct:   HCC Plan MINIMAL VNC-Session (Openbox statt XFCE)
#
# PORT-MAPPING (PARALLEL):
# - 8081:       Guacamole Web-Interface (DIRECT Version)
# - 5902:       VNC-Access zu HCC Plan GUI (anna-direct)
#
# PERFORMANCE-ZIELE:
# ✅ Memory-Reduktion: 350MB → 155MB (55% Reduktion)
# ✅ Startup-Beschleunigung: 30-45s → 10-15s
# ✅ Clean GUI: Nur HCC Plan, kein Desktop-Clutter
# ✅ 100% Kompatibilität: Alle HCC Plan Features funktional
#
# TESTING-STRATEGIE:
# 1. Build: docker-compose -f docker-compose-DIRECT.yml up --build -d
# 2. Test: http://localhost:8081/guacamole/ → anna/test123 
# 3. Vergleich: Parallel zu http://localhost:8080/guacamole/ (Phase 2B)
# 4. Performance: Memory-Usage und Startup-Zeit messen
#
# FALLBACK-SICHERHEIT:
# - Phase 2B bleibt verfügbar auf Port 8080
# - Bei Problemen: docker-compose -f docker-compose-DIRECT.yml down
# - Zurück zu bewährter Lösung ohne Datenverlust
