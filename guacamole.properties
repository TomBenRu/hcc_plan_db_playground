# guacamole.properties
# HCC Plan Guacamole Configuration für Standard Authentication
# Alternative zu SQLite JDBC: User-Mapping-XML mit Test-Users

# Guacd Connection Settings
guacd-hostname: guacd
guacd-port: 4822

# Authentication Method: File-based (user-mapping.xml)
# This is the simplest and most reliable method for our test setup
user-mapping: /etc/guacamole/user-mapping.xml

# Disable JSON extension (was causing DOM rendering issues)
# auth-provider: net.sourceforge.guacamole.net.auth.json.JSONAuthenticationProvider

# Session Configuration
session-timeout: 240

# Recording Configuration (optional)
recording-path: /recordings
create-recording-path: true

# Logging Level
log-level: INFO

# Notes:
# - Using XML-based authentication for simplicity and reliability
# - Test users: anna/test123, jens/test123, demo/demo123, guacadmin/guacadmin
# - Each user gets dedicated VNC connection
# - No database dependencies - pure file-based configuration
