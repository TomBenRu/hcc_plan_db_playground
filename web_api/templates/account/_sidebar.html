{# Sidebar für /account-Seiten — erwartet Variable: active_tab ("profile" | "credentials") #}
<aside class="page-sidebar bg-navy grid-bg flex flex-col overflow-y-auto sidebar-scroll
              p-6 animate-fade-up border-r border-white/5">

    {# Brand-Header #}
    <div class="sidebar-header mb-6">
        <div class="flex items-center gap-1.5 mb-2">
            <span class="inline-block w-1.5 h-1.5 rounded-full" style="background-color:#F97316;"></span>
            <span class="text-xs font-semibold tracking-widest uppercase font-sans text-orange-400/80">
                Konto
            </span>
        </div>
        <h1 class="font-display text-white text-2xl font-semibold leading-tight tracking-tight">
            Mein Konto
        </h1>
        <p class="font-sans text-xs text-slate-500 mt-1.5">
            Persönliche Daten und Zugangseinstellungen.
        </p>
    </div>

    <div class="sidebar-divider border-t border-white/5 mb-5"></div>

    {# Tabs #}
    <div class="flex flex-col gap-1.5">
        <a href="/account/profile"
           class="filter-btn flex items-center gap-2.5 w-full px-3 py-2 rounded-lg border
                  border-transparent text-sm font-sans text-slate-400
                  {% if active_tab == 'profile' %}active{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            Persönliche Daten
        </a>

        <a href="/account/credentials"
           class="filter-btn flex items-center gap-2.5 w-full px-3 py-2 rounded-lg border
                  border-transparent text-sm font-sans text-slate-400
                  {% if active_tab == 'credentials' %}active{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M12 11c0-1.5 1-3 3-3s3 1.5 3 3-1 2-2 3-1 2-1 3M12 17h.01M5 12a7 7 0 1114 0 7 7 0 01-14 0z"/>
            </svg>
            Zugangsdaten
        </a>
    </div>

    {# Spacer + Back-Link unten #}
    <div class="sidebar-spacer flex-1"></div>

    <a href="/dashboard"
       class="sidebar-back inline-flex items-center gap-2 text-xs text-slate-500 hover:text-white transition-colors mt-6 font-sans">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        Zurück zum Dashboard
    </a>
</aside>
