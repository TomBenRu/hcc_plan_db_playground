{% if ok %}
<div class="bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-700/50 rounded-lg px-4 py-3 text-sm font-sans text-green-800 dark:text-green-300">
    <div class="flex items-start gap-2">
        <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
        <div>
            <p class="font-medium">Versand erfolgreich.</p>
            <p class="mt-1 text-green-700 dark:text-green-400">{{ message }}</p>
        </div>
    </div>
</div>
{% else %}
<div class="bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-700/50 rounded-lg px-4 py-3 text-sm font-sans text-red-800 dark:text-red-300">
    <div class="flex items-start gap-2">
        <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
        <div>
            <p class="font-medium">Versand fehlgeschlagen.</p>
            <p class="mt-1 text-red-700 dark:text-red-400 font-mono text-xs break-words">{{ message }}</p>
        </div>
    </div>
</div>
{% endif %}
