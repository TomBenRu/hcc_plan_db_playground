{# Erfolgs-Antwort nach erfolgreicher Einladung.
   Loest per HX-Trigger einen Reload der Listenseite aus. #}

<div id="invite-modal-backdrop"
     class="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4"
     onclick="if (event.target === this) { document.getElementById('invite-modal-wrap').innerHTML = ''; window.location.reload(); }">
    <div class="bg-white dark:bg-slate-800 rounded-xl shadow-xl max-w-md w-full
                border border-slate-200 dark:border-slate-700 overflow-hidden">
        <div class="p-6 flex flex-col items-center text-center gap-3">
            <div class="w-12 h-12 rounded-full bg-emerald-100 dark:bg-emerald-900/30
                        flex items-center justify-center">
                <svg class="w-6 h-6 text-emerald-600 dark:text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h3 class="font-display text-lg font-semibold text-slate-800 dark:text-slate-100">
                Einladung verschickt
            </h3>
            <p class="text-sm text-slate-500 dark:text-slate-400">
                Eine Setup-Mail ist an
                <span class="font-medium text-slate-700 dark:text-slate-200">{{ new_user.email }}</span>
                unterwegs. Der Link ist 7 Tage gültig.
            </p>
            <button type="button"
                    onclick="document.getElementById('invite-modal-wrap').innerHTML = ''; window.location.reload();"
                    class="mt-2 px-4 py-2 rounded-md text-sm font-medium
                           bg-slate-100 dark:bg-slate-700/40 hover:bg-slate-200 dark:hover:bg-slate-700
                           text-slate-700 dark:text-slate-200 transition-colors">
                Schließen
            </button>
        </div>
    </div>
</div>
