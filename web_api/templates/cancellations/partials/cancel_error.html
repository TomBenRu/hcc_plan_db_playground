{# HTMX-Partial: Fehlermeldung bei gescheiterter Absage #}
<div id="cancel-form" class="mt-3 bg-red-50 rounded-xl border border-red-200 p-4">
    <p class="text-xs font-semibold tracking-widest uppercase text-red-500 mb-1">Absage nicht möglich</p>
    <p class="text-sm text-red-700">{{ message }}</p>
    <button type="button"
            onclick="this.closest('#cancel-form').remove()"
            class="mt-3 px-4 py-2 rounded-lg text-xs font-medium border border-red-200 text-red-500 hover:bg-red-100 transition-colors">
        Schließen
    </button>
</div>
