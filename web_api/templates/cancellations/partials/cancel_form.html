{# HTMX-Partial: Absage-Formular. Kontext: appointment_id #}
<div id="cancel-form" class="mt-3 bg-rose-50 dark:bg-rose-900/20 rounded-xl border border-rose-100 dark:border-rose-900/40 p-4">
    <p class="text-xs font-semibold tracking-widest uppercase text-rose-500 dark:text-rose-300 mb-3">Termin absagen</p>
    <form hx-post="/cancellations"
          hx-target="#cancel-form"
          hx-swap="outerHTML">
        <input type="hidden" name="appointment_id" value="{{ appointment_id }}">
        <div class="mb-3">
            <label class="block text-xs text-slate-500 dark:text-slate-400 mb-1">Begründung (optional)</label>
            <textarea name="reason" rows="3"
                      placeholder="Kurze Begründung…"
                      class="w-full text-sm rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-2.5 resize-none focus:outline-none focus:ring-2 focus:ring-rose-200 dark:focus:ring-rose-500/40 focus:border-rose-300 dark:focus:border-rose-500/60"></textarea>
        </div>
        <div class="flex gap-2">
            <button type="submit"
                    class="flex-1 py-2 rounded-lg text-sm font-medium bg-rose-500 text-white hover:bg-rose-600 dark:bg-rose-600 dark:hover:bg-rose-500 transition-colors">
                Absagen
            </button>
            <button type="button"
                    hx-get="/cancellations/cancel-button/{{ appointment_id }}"
                    hx-target="#cancellation-action-area"
                    hx-swap="innerHTML"
                    class="px-4 py-2 rounded-lg text-sm font-medium border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                Abbrechen
            </button>
        </div>
    </form>
</div>
