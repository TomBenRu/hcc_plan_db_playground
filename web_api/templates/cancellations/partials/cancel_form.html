{# HTMX-Partial: Absage-Formular. Kontext: appointment_id #}
<div id="cancel-form" class="mt-3 bg-rose-50 rounded-xl border border-rose-100 p-4">
    <p class="text-xs font-semibold tracking-widest uppercase text-rose-500 mb-3">Termin absagen</p>
    <form hx-post="/cancellations"
          hx-target="#cancel-form"
          hx-swap="outerHTML">
        <input type="hidden" name="appointment_id" value="{{ appointment_id }}">
        <div class="mb-3">
            <label class="block text-xs text-slate-500 mb-1">Begründung (optional)</label>
            <textarea name="reason" rows="3"
                      placeholder="Kurze Begründung…"
                      class="w-full text-sm rounded-lg border border-slate-200 p-2.5 resize-none focus:outline-none focus:ring-2 focus:ring-rose-200 focus:border-rose-300"></textarea>
        </div>
        <div class="flex gap-2">
            <button type="submit"
                    class="flex-1 py-2 rounded-lg text-sm font-medium bg-rose-500 text-white hover:bg-rose-600 transition-colors">
                Absagen
            </button>
            <button type="button"
                    hx-get="/cancellations/cancel-button/{{ appointment_id }}"
                    hx-target="#cancellation-action-area"
                    hx-swap="innerHTML"
                    class="px-4 py-2 rounded-lg text-sm font-medium border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors">
                Abbrechen
            </button>
        </div>
    </form>
</div>
