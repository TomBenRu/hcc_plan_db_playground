{# HTMX-Partial: Notiz-Anzeige (Read-Modus). #}
{# Kontext: appointment (database.models.Appointment) #}

<div id="notes-section" class="mb-3">
    {% if appointment.notes %}
    <div class="bg-amber-50 dark:bg-amber-900/20 rounded-xl border border-amber-100 dark:border-amber-700/40 p-4">
        <div class="flex items-start justify-between gap-2 mb-2">
            <p class="text-xs font-semibold tracking-widest uppercase text-amber-500 dark:text-amber-400">Anmerkung</p>
            <button
                hx-get="/dispatcher/plan/appointments/{{ appointment.id }}/notes?edit=1"
                hx-target="#notes-section"
                hx-swap="outerHTML"
                title="Anmerkung bearbeiten"
                aria-label="Anmerkung bearbeiten"
                class="flex-shrink-0 w-7 h-7 rounded-lg flex items-center justify-center
                       text-amber-500 dark:text-amber-400
                       hover:bg-amber-100 dark:hover:bg-amber-900/40
                       hover:text-amber-700 dark:hover:text-amber-300
                       transition-colors focus:outline-none focus:ring-2 focus:ring-amber-300/50">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                </svg>
            </button>
        </div>
        <p class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed whitespace-pre-wrap">{{ appointment.notes }}</p>
    </div>
    {% else %}
    <button
        hx-get="/dispatcher/plan/appointments/{{ appointment.id }}/notes?edit=1"
        hx-target="#notes-section"
        hx-swap="outerHTML"
        class="w-full flex items-center justify-center gap-2 py-3 rounded-xl
               bg-amber-50 dark:bg-amber-900/15
               border border-dashed border-amber-200 dark:border-amber-700/40
               text-amber-700 dark:text-amber-400
               hover:bg-amber-100 dark:hover:bg-amber-900/25
               hover:border-amber-300 dark:hover:border-amber-600/60
               transition-colors text-xs font-medium font-sans
               focus:outline-none focus:ring-2 focus:ring-amber-300/50">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        Anmerkung hinzufügen
    </button>
    {% endif %}
</div>
