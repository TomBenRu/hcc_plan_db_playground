{# HTMX-Partial: Notiz-Edit-Formular. #}
{# Kontext: appointment (database.models.Appointment) #}

<form id="notes-section"
      hx-patch="/dispatcher/plan/appointments/{{ appointment.id }}/notes"
      hx-target="#notes-section"
      hx-swap="outerHTML"
      class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 mb-3">
    <label for="notes-input-{{ appointment.id }}"
           class="block text-xs font-semibold tracking-widest uppercase text-slate-400 mb-2">
        Anmerkung
    </label>
    <textarea
        id="notes-input-{{ appointment.id }}"
        name="notes"
        rows="3"
        class="w-full text-sm font-sans rounded-lg p-2 resize-y
               bg-white dark:bg-slate-900
               text-slate-700 dark:text-slate-100
               border border-slate-200 dark:border-slate-700
               placeholder:text-slate-400 dark:placeholder:text-slate-500
               focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand/50"
        placeholder="Anmerkung eingeben …"
        autofocus>{{ appointment.notes or '' }}</textarea>
    <div class="flex items-center justify-end gap-2 mt-3">
        <button type="button"
                hx-get="/dispatcher/plan/appointments/{{ appointment.id }}/notes"
                hx-target="#notes-section"
                hx-swap="outerHTML"
                class="text-xs text-slate-500 hover:text-slate-700 transition-colors font-sans px-3 py-1.5">
            Abbrechen
        </button>
        <button type="submit"
                class="text-xs font-medium text-white bg-brand hover:bg-brand-600 rounded-lg px-3 py-1.5 transition-colors font-sans">
            Speichern
        </button>
    </div>
</form>
