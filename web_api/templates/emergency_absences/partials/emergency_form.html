{# HTMX-Partial: Notfall-Absage-Formular. Kontext: appointment_id #}
<div id="emergency-form" class="mt-3 bg-red-50 dark:bg-red-900/20 rounded-xl border border-red-200 dark:border-red-900/50 p-4">
    <p class="text-xs font-semibold tracking-widest uppercase text-red-600 dark:text-red-300 mb-2">
        Notfall-Absage
    </p>
    <p class="text-xs text-red-700 dark:text-red-200 mb-3 leading-relaxed">
        Die reguläre Absagefrist ist abgelaufen. Du wirst sofort aus der Besetzung entfernt
        und der Dispatcher sowie der Notfall-Kreis werden automatisch benachrichtigt.
        Diese Aktion kann <strong>nicht zurückgezogen</strong> werden.
    </p>
    <form hx-post="/emergency-absences"
          hx-target="#emergency-form"
          hx-swap="outerHTML">
        <input type="hidden" name="appointment_id" value="{{ appointment_id }}">
        <div class="mb-3">
            <label class="block text-xs text-slate-500 dark:text-slate-400 mb-1">
                Grund <span class="text-red-500">*</span>
            </label>
            <textarea name="reason" rows="3" required minlength="3" maxlength="500"
                      placeholder="z. B. Krankheit, Notfall in der Familie …"
                      class="w-full text-sm rounded-lg border border-red-200 dark:border-red-800/60 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-2.5 resize-none focus:outline-none focus:ring-2 focus:ring-red-300 dark:focus:ring-red-500/40 focus:border-red-400 dark:focus:border-red-500/60"></textarea>
        </div>
        <div class="flex gap-2">
            <button type="submit"
                    class="flex-1 py-2 rounded-lg text-sm font-medium bg-red-600 text-white hover:bg-red-700 dark:bg-red-600 dark:hover:bg-red-500 transition-colors">
                Notfall-Absage abschicken
            </button>
            <button type="button"
                    onclick="document.getElementById('emergency-form').remove()"
                    class="px-4 py-2 rounded-lg text-sm font-medium border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                Abbrechen
            </button>
        </div>
    </form>
</div>
