{# HTMX-Partial: Unread-Badge für Navigation. Kontext: unread_count #}
<span id="inbox-badge">
    {% if unread_count > 0 %}
    <span class="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-rose-500 text-white text-[9px] font-bold flex items-center justify-center">
        {{ unread_count if unread_count < 100 else "99+" }}
    </span>
    {% endif %}
</span>
