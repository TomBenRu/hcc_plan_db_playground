{# Erwartet: m (CircleMember), loc (LocationOfWork) #}
<li id="member-{{ m.web_user_id }}"
    class="flex items-center gap-3 px-3 py-2 rounded-lg
           bg-slate-50 dark:bg-slate-900/40
           border border-slate-100 dark:border-slate-700/50">
    <div class="flex-1 min-w-0">
        <p class="text-sm text-slate-800 dark:text-slate-100 truncate">{{ m.person_name }}</p>
        <p class="text-[11px] text-slate-500 dark:text-slate-400 truncate">{{ m.email }}</p>
    </div>
    <span class="text-[10px] text-slate-400 dark:text-slate-500 font-mono">
        {{ m.added_at.strftime("%d.%m.%Y") }}
    </span>
    <button hx-delete="/dispatcher/notification-circles/{{ loc.id }}/members/{{ m.web_user_id }}"
            hx-target="#detail-pane"
            hx-swap="innerHTML"
            hx-confirm="„{{ m.person_name }}" aus der Whitelist entfernen?"
            class="flex-shrink-0 w-7 h-7 rounded-md flex items-center justify-center
                   text-slate-400 dark:text-slate-500
                   hover:bg-rose-50 dark:hover:bg-rose-900/20
                   hover:text-rose-600 dark:hover:text-rose-400
                   transition-colors"
            aria-label="Entfernen">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
</li>
