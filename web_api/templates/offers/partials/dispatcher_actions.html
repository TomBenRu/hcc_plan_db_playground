{# Dispatcher-Aktionen für ein pending Offer: Accept + Ablehnen-Button. #}
{# Der Ablehnen-Button lädt via HTMX den Reject-Form-Partial und ersetzt #}
{# diesen Wrapper. Kontext: offer (AvailabilityOfferDetail) #}
<div id="dispatcher-actions" class="pt-2 flex gap-2">
    <form hx-post="/offers/{{ offer.id }}/accept"
          hx-swap="none"
          hx-on::after-request="if(event.detail.successful) window.location.reload()"
          class="flex-1">
        <button type="submit"
                class="w-full py-2.5 rounded-xl text-sm font-medium bg-green-600 text-white hover:bg-green-700 transition-colors">
            Annehmen
        </button>
    </form>
    <button type="button"
            hx-get="/offers/{{ offer.id }}/actions?edit=1"
            hx-target="#dispatcher-actions"
            hx-swap="outerHTML"
            class="flex-1 py-2.5 rounded-xl text-sm font-medium
                   border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300
                   hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
        Ablehnen
    </button>
</div>
