{# Dispatcher-Aktionen im Reject-Modus: Textarea + Abbrechen/Absenden. #}
{# Abbrechen holt via HTMX den Default-Partial wieder. Kontext: offer (AvailabilityOfferDetail) #}
<div id="dispatcher-actions" class="pt-2">
    <form hx-post="/offers/{{ offer.id }}/reject"
          hx-swap="none"
          hx-on::after-request="if(event.detail.successful) window.location.reload()"
          class="space-y-2">
        <textarea name="reason"
                  rows="3"
                  maxlength="500"
                  autofocus
                  placeholder="Begründung (optional, wird dem Mitarbeiter mitgeteilt)"
                  class="w-full px-3 py-2 rounded-lg text-sm
                         bg-white dark:bg-slate-800
                         border border-slate-200 dark:border-slate-700
                         text-slate-800 dark:text-slate-100
                         placeholder:text-slate-400 dark:placeholder:text-slate-500
                         focus:outline-none focus:ring-2 focus:ring-red-200 dark:focus:ring-red-700/50
                         focus:border-red-300 dark:focus:border-red-600 resize-none"></textarea>
        <div class="flex gap-2">
            <button type="button"
                    hx-get="/offers/{{ offer.id }}/actions?edit=0"
                    hx-target="#dispatcher-actions"
                    hx-swap="outerHTML"
                    class="flex-1 py-2.5 rounded-xl text-sm font-medium
                           border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300
                           hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                Abbrechen
            </button>
            <button type="submit"
                    class="flex-1 py-2.5 rounded-xl text-sm font-medium bg-red-600 text-white hover:bg-red-700 transition-colors">
                Ablehnung abschicken
            </button>
        </div>
    </form>
</div>
