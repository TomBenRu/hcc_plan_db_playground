{# HTMX-Partial: Fehlermeldung bei gescheiterter Tausch-Anfrage #}
<div id="swap-error" class="mt-3 bg-red-50 dark:bg-red-900/20 rounded-xl border border-red-200 dark:border-red-700/50 p-4">
    <p class="text-xs font-semibold tracking-widest uppercase text-red-500 mb-1">Tausch nicht möglich</p>
    <p class="text-sm text-red-700 dark:text-red-300">{{ message }}</p>
    <button type="button"
            onclick="this.closest('#swap-error').remove()"
            class="mt-3 px-4 py-2 rounded-lg text-xs font-medium border border-red-200 dark:border-red-700 text-red-500 hover:bg-red-100 dark:hover:bg-red-900/40 transition-colors">
        Schließen
    </button>
</div>
