{# HTMX-Partial: Bestätigung nach erfolgreich gesendeter Tausch-Anfrage #}
<div class="bg-green-50 dark:bg-green-900/20 rounded-xl border border-green-200 dark:border-green-700/50 p-4">
    <p class="text-xs font-semibold tracking-widest uppercase text-green-600 dark:text-green-400 mb-1">Anfrage gesendet</p>
    <p class="text-sm text-slate-700 dark:text-slate-300">
        Deine Tausch-Anfrage wurde weitergeleitet.
        <a href="/swap-requests" class="text-brand underline">Alle Anfragen ansehen</a>
    </p>
</div>
{% if submitted_targets %}
<script>
(function() {
    const targets = {{ submitted_targets | tojson }};
    targets.forEach(function(t) {
        const sel = '.swap-offer-btn[data-target-appt-id="' + t.appt_id + '"]'
                  + '[data-target-user-id="' + t.user_id + '"]';
        const btn = document.querySelector(sel);
        if (btn) {
            btn.classList.remove('is-selected');
            btn.classList.add('is-submitted');
            btn.setAttribute('disabled', 'disabled');
            btn.textContent = 'Anfrage gestellt';
        }
    });
})();
</script>
{% endif %}
